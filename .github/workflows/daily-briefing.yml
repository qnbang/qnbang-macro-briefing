name: Daily Macro Briefing

on:
  schedule:
    # 매일 UTC 22:30 실행 -> 한국 시간(KST) 오전 07:30
    - cron: '30 22 * * *'
  workflow_dispatch: # GitHub 웹 UI에서 수동 실행 가능하도록 설정

# GitHub Actions가 코드를 수정하고 Push할 수 있도록 권한 부여
permissions:
  contents: write

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r 브리핑기/requirements.txt

    - name: Run Auto Briefing Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python 브리핑기/list_models.py
        python 브리핑기/auto_briefing.py

    - name: Commit and Push changes
      run: |
        git config --global user.email "ceo@qnbang.com"
        git config --global user.name "신종호"
        git add -A
        # 변경 사항이 있을 때만 커밋 및 푸시
        if ! git diff-index --quiet HEAD; then
          git commit -m "데일리 자동발행 (GitHub Actions) $(date +%Y-%m-%d)"
          git push
        else
          echo "변경 사항 없음 — 푸시 생략"
        fi
